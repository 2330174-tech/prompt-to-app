<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PromptCompiler — NL → working app</title>
<style>
  :root{--bg:#f6f8fb;--ink:#1c2330;--muted:#64748b;--blue:#1d4ed8;--line:#e2e8f0}
  *{box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:var(--bg);color:var(--ink)}
  header{padding:22px 30px;background:#0f1b2d;color:#fff}
  header h1{margin:0;font-size:20px}
  header p{margin:4px 0 0;color:#9fb0c9;font-size:13px}
  .container{max-width:1100px;margin:0 auto;padding:24px 20px}
  textarea{width:100%;min-height:90px;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:14px;resize:vertical}
  .row{display:flex;gap:12px;align-items:center;margin-top:12px;flex-wrap:wrap}
  button{background:var(--blue);color:#fff;border:0;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px}
  button.ghost{background:#fff;color:var(--blue);border:1px solid var(--blue)}
  select{padding:8px;border:1px solid var(--line);border-radius:8px}
  .chips{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{background:#eef2ff;color:#3730a3;border:0;padding:6px 10px;border-radius:20px;font-size:12px;cursor:pointer}
  .metrics{display:flex;gap:14px;flex-wrap:wrap;margin:18px 0}
  .m{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:110px}
  .m .n{font-size:22px;font-weight:700;color:var(--blue)}
  .m .l{font-size:12px;color:var(--muted)}
  .status-ok{color:#15803d;font-weight:700}
  .status-failed{color:#b91c1c;font-weight:700}
  .status-needs_clarification{color:#b45309;font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
  details{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px}
  summary{cursor:pointer;font-weight:600}
  pre{background:#0f1b2d;color:#cde3ff;padding:12px;border-radius:8px;overflow:auto;font-size:12px;max-height:340px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin-top:14px}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:8px 10px;border-radius:8px;margin:6px 0;font-size:13px}
  .clar{background:#fffbeb;border:1px solid #fde68a;padding:8px 10px;border-radius:8px;margin:6px 0;font-size:13px}
  iframe{width:100%;height:560px;border:1px solid var(--line);border-radius:10px;background:#fff}
  .muted{color:var(--muted);font-size:13px}
  .pill{font-size:11px;background:#dcfce7;color:#166534;border-radius:20px;padding:3px 9px}
</style>
</head>
<body>
<header>
  <h1>🧩 PromptCompiler</h1>
  <p>A compiler for software generation: natural language → multi-stage pipeline → validated config → a running app.</p>
</header>
<div class="container">
  <textarea id="prompt" placeholder="Describe the app you want…">Build a CRM with login, contacts, dashboard, role-based access, and premium plan with payments. Admins can see analytics.</textarea>
  <div class="chips" id="examples"></div>
  <div class="row">
    <button id="go">⚙️ Compile</button>
    <label class="muted">On vague prompts:
      <select id="mode">
        <option value="assume">make assumptions</option>
        <option value="clarify">ask for clarification</option>
      </select>
    </label>
    <span id="llmmode" class="pill" style="display:none"></span>
  </div>

  <div id="out"></div>
</div>

<script>
const EXAMPLES = [
  "Build a blog with posts, comments, login and an admin who can moderate.",
  "Project management tool with projects, tasks, users and a dashboard.",
  "Online store with products, orders, customer login and a premium plan.",
  "Help desk with tickets, agents, role-based access and analytics for admins.",
  "make an app",
  "A todo app but no login, yet only admins can delete tasks."
];
const ex = document.getElementById('examples');
EXAMPLES.forEach(e=>{const b=document.createElement('button');b.className='chip';b.textContent=e;b.onclick=()=>document.getElementById('prompt').value=e;ex.appendChild(b);});

fetch('/health').then(r=>r.json()).then(h=>{
  const el=document.getElementById('llmmode');el.style.display='inline-block';
  el.textContent = h.mode==='gemini' ? ('LLM: Gemini ('+h.model+')') : 'LLM: deterministic mock (no API key)';
});

const out = document.getElementById('out');
const go = document.getElementById('go');

go.onclick = async () => {
  const prompt = document.getElementById('prompt').value.trim();
  const mode = document.getElementById('mode').value;
  if(!prompt){return;}
  go.disabled=true; go.textContent='Compiling…'; out.innerHTML='';
  try{
    const res = await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,mode})});
    const d = await res.json();
    render(d);
  }catch(e){ out.innerHTML='<div class="err">Request failed: '+e+'</div>'; }
  go.disabled=false; go.textContent='⚙️ Compile';
};

function metric(n,l){return `<div class="m"><div class="n">${n}</div><div class="l">${l}</div></div>`;}

function render(d){
  let h = `<div class="panel"><span class="status-${d.status}">● ${d.status.toUpperCase()}</span>`;
  h += `<div class="metrics">`;
  h += metric((d.total_latency_ms||0).toFixed(0)+' ms','latency');
  h += metric(d.total_retries||0,'repairs applied');
  h += metric((d.total_input_tokens||0)+(d.total_output_tokens||0),'tokens');
  h += metric('$'+(d.est_cost_usd||0).toFixed(6),'est. cost');
  h += `</div></div>`;

  if(d.status==='needs_clarification'){
    h += `<div class="panel"><h3>Clarifying questions</h3>`;
    d.clarifications.forEach(c=> h+=`<div class="clar">❓ ${c}</div>`);
    h += `</div>`;
  }
  if(d.errors && d.errors.length){
    h += `<div class="panel"><h3>Unresolved errors</h3>`;
    d.errors.forEach(e=> h+=`<div class="err">${e.code||e.stage||''}: ${e.message}</div>`);
    h += `</div>`;
  }

  if(d.config){
    const c = d.config;
    if(c.intent.assumptions && c.intent.assumptions.length){
      h += `<div class="panel"><h3>Documented assumptions</h3>`;
      c.intent.assumptions.forEach(a=> h+=`<div class="clar">• ${a}</div>`);
      if(c.intent.ambiguities.length) c.intent.ambiguities.forEach(a=> h+=`<div class="err">⚠ ${a}</div>`);
      h += `</div>`;
    }
    if(d.cid){
      h += `<div class="panel"><h3>▶ Live app preview <span class="muted">(the generated config, running)</span></h3>
        <iframe src="/preview/${d.cid}"></iframe></div>`;
    }
    h += `<h3 style="margin-top:18px">Generated configuration</h3><div class="grid">`;
    h += layer('Intent (IR)', c.intent);
    h += layer('Architecture', c.architecture);
    h += layer('Database schema', c.db);
    h += layer('API schema', c.api);
    h += layer('UI schema', c.ui);
    h += layer('Auth schema', c.auth);
    h += `</div>`;
    h += `<details style="margin-top:14px"><summary>Per-stage metrics</summary><pre>${JSON.stringify(c.metrics,null,2)}</pre></details>`;
  }
  out.innerHTML = h;
}

function layer(title,obj){
  return `<details><summary>${title}</summary><pre>${JSON.stringify(obj,null,2)}</pre></details>`;
}
</script>
</body>
</html>
