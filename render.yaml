# Render Blueprint — auto-configures the free web service on deploy.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: promptcompiler
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Leave unset to run in free deterministic mock mode.
      # Add your free key in the Render dashboard to use Gemini.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
